schema_version: "0.2"

id: perplexity
label: Perplexity
node_id: ideation-chat
website: https://www.perplexity.ai

# Lifecycle
status: active
data_source: manual
contributed_by: maintainer
last_verified: 2026-05-25

# Identity
hosting: cloud
open_source: false
license: proprietary

# Access
api_access: true
api_docs: https://docs.perplexity.ai
model_agnostic: false  # uses own model mix; not user-configurable

# Pricing
pricing_model: freemium
free_tier: true
free_tier_limits: "Limited daily queries on Pro search; standard search unlimited"
paid_tiers: "Perplexity Pro (~$20/month) — unlimited Pro searches, API access, file uploads"
price_signal: low

# Compliance & Geography
data_residency: ["US"]
compliance_certifications: []
no_training_on_data: false  # standard tier data may be used; Pro has opt-out

# Integrations
integrations:
  - Perplexity API (REST)
  - MCP (Model Context Protocol)

# Criteria scores
criteria_scores:
  security-compliance: low     # no EU data residency, limited compliance certs
  integration-depth: medium    # API + MCP available, but no enterprise SSO/IAM
  observability: low           # no audit trail or usage logging for enterprise
  cost-tco: high               # free tier viable; Pro very affordable
  speed-delivery: high         # instant setup, no infrastructure required

notes: >
  Strong choice for solo/small team ideation and research. Not suitable for
  enterprise use cases with GDPR/EU data residency requirements or SOC2 mandates.
  MCP integration makes it useful as an agentic tool in orchestrated workflows.
